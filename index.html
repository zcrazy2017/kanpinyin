<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看拼音写词语 · 智能练习系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ==================== 桌面（默认显示） ==================== -->
<div id="desktop" class="active">
  <div class="desktop-wallpaper">
    <!-- 桌面图标区 -->
    <div class="desktop-icons-area">
      <div class="desktop-icon-grid" id="desktopIconGrid"></div>
    </div>
    <!-- 底部任务栏 -->
    <div class="desktop-taskbar">
      <span class="taskbar-title">📖 智能练习系统</span>
      <span class="taskbar-clock" id="taskbarClock"></span>
    </div>
  </div>
</div>

<!-- ==================== 应用窗口 ==================== -->
<div id="appWindow">
  <!-- 标题栏 + 返回按钮 -->
  <div class="app-title-bar">
    <button class="app-back-btn" onclick="App.Desktop.closeApp()">← 返回桌面</button>
    <div class="app-title-center">
      <span class="app-title-text" id="appWindowTitle">📝 看拼音写汉字</span>
    </div>
    <div style="width:100px;"></div>
  </div>
  <!-- 应用主体内容 -->
  <div class="app-body">
    <!-- ===== App: 看拼音写汉字（由 kanpinyin-app.js 渲染） ===== -->
    <div class="app-content active" id="app-content-kanpinyin"></div>
    <!-- ===== App: 精灵乐园（由 pet.js 渲染） ===== -->
    <div class="app-content" id="app-content-pet"></div>
    <!-- ===== App: 拼音大闯关（由 pinyin-game.js 渲染） ===== -->
    <div class="app-content" id="app-content-pinyingame"></div>
  </div>
</div>

<!-- ==================== 全局浮动精灵 ==================== -->
<div id="globalPet" class="global-pet" onclick="App.Pet._onGlobalPetClick()">
  <div id="globalPetSprite" class="global-pet-sprite"></div>
  <div id="globalPetBubble" class="global-pet-bubble" style="display:none;"><span id="globalPetBubbleText"></span></div>
</div>

<!-- ===== 主题预览弹窗 ===== -->
<div class="modal-overlay" id="petPreviewModal">
  <div class="modal" style="max-width:520px;">
    <h3 id="petPreviewTitle">🦊 火灵狐</h3>
    <div id="petPreviewContent" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:12px 0;"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="petPreviewUnlockBtn" onclick="App.Pet._previewUnlock()">🔓 消耗 30 EXP 解锁</button>
      <button class="btn btn-ghost" onclick="document.getElementById('petPreviewModal').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

<!-- ==================== Print Area ==================== -->
<div class="print-area" id="printArea"></div>

<!-- ==================== Toast Container ==================== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ==================== Confirm Modal ==================== -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:360px;">
    <h3>⚠️ 确认操作</h3>
    <p id="confirmMsg" style="font-size:15px;color:#4a5568;margin:12px 0;"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="confirmNo()">取消</button>
      <button class="btn btn-danger" onclick="confirmYes()">确定</button>
    </div>
  </div>
</div>

<!-- ==================== Kanpinyin App Modals (由 kanpinyin-app.js 注入) ==================== -->

<!-- ==================== JavaScript (modular) ==================== -->
<script src="src/data/store.js"></script>
<script src="src/app.js"></script>
<script src="src/utils/ui.js"></script>
<script src="src/modules/practice.js"></script>
<script src="src/modules/library.js"></script>
<script src="src/modules/history.js"></script>
<script src="src/modules/dict.js"></script>
<script src="src/modules/stats.js"></script>
<script src="src/modules/kanpinyin-app.js"></script>
<script src="src/modules/desktop.js"></script>
<!-- 精灵主题（可扩展） -->
<script src="src/pet-themes/registry.js"></script>
<script src="src/pet-themes/dragon.js"></script>
<script src="src/pet-themes/firefox.js"></script>
<script src="src/pet-themes/icerabbit.js"></script>
<script src="src/modules/pet.js"></script>
<script src="src/modules/pinyin-game.js"></script>
<script src="src/main.js"></script>

</body>
</html>
